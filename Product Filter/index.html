<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Product Filter/style.css">
    <title>Product Filte</title>
</head>
<body>
    <h2>PRODUCT FILTER LIST</h2>
    <div id="inputContainer">
    <label for="search" >Search</label>
    <input type="text" id="search">
    <label for="">Category</label>
    <select name="" id="">
        <option value="Categories" selected disabled>Categories</option>
        <option value="shirt">Shirt</option>
        
    </select>
    <label for="">Price Range</label>
    <input type="text" id="min" placeholder="min">
    <input type="text" id="max" placeholder="max"> 
    </div>
    <label for="">Sort</label>
    <select name="" id="sortSelect">
        <option value="hidden" selected disabled hidden>Sort</option>
       <option class="sortOpt" value="low to high">low to high</option>
       <option class="sortOpt" value="high to low">high to low</option>
    </select>
    <div id="productContainer">
      
    </div>
    <script src="/Product Filter/main.js"></script>
</body>
</html>
